{% extends "base.html" %}

{% block style %}
{% load static %}
<link rel="stylesheet" href={% static "addrecipe.css" %}>    
{% endblock style %}

{% block content %}
 <div class="container">
        <h2>Create a New Recipe</h2>
        <form action=" " method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="input-group">
                <label for="title">Recipe Title:</label>
                <input type="text" id="title" name="title" placeholder="Enter recipe title" required>
            </div>

            <div class="input-group">
                <label for="description">Description:</label>
                <textarea id="description" name="description" rows="3" placeholder="Briefly describe your recipe..." required></textarea>
            </div>

            <div class="input-group">
                <label for="ingredients">Ingredients:</label>
                <textarea id="ingredients" name="ingredients" rows="5" placeholder="List your ingredients..." required></textarea>
            </div>

            <div class="input-group">
                <label for="category">Category:</label>
                <select id="category" name="category" required>
                    <option value="">Select Category</option>
                    <option value="Healthy Salads">Healthy Salads</option>
                    <option value="Desserts & Sweets">Desserts & Sweets</option>
                    <option value="Quick Snacks">Quick Snacks</option>
                    <option value="Drinks & Beverages">Drinks & Beverages</option>
                    <option value="Non-Vegetarian">Non-Vegetarian</option>
                    <option value="Vegetarian & Vegan">Vegetarian & Vegan</option>
                    
                </select>
            </div>

            <div class="input-group">
                <label for="steps">Steps:</label>
                <textarea id="steps" name="steps" rows="7" placeholder="Write the cooking steps..." required></textarea>
            </div>

            <div class="input-group">
                <label for="image">Recipe Image:</label>
                <input type="file" id="image" name="image" accept="image/*">
            </div>

            <button type="submit" >Post Recipe</button>
        </form>
    </div>

{% endblock content %}
